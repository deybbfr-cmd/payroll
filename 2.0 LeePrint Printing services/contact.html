<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="return-home">Return Home</a>

    <main>
        <section class="page-section">
             <h1>Contact Us</h1>

              <p class="contact-section-title">Social Media</p>
              <div class="contact-cards">

                <a href="https://facebook.com/leeprint" target="_blank" class="contact-card">
                    <div class="contact-icon facebook">
                         <i class="fa-brands fa-facebook"></i>
                    </div>
                    <div class="contact-info">
                        <span class="platform">Facebook</span>
                        <span class="handle">facebook.com/leeprint</span>
                    </div>
                </a>

                <a href="https://instagram.com/leeprint" target="_blank" class="contact-card">
                    <div class="contact-icon instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </div>
                    <div class="contact-info">
                        <span class="platform">Instagram</span>
                        <span class="handle">@leeprint</span>
                    </div>
                </a>
              </div>

              <p class="contact-section-title">Get in Touch</p>
              <div class="contact-cards">
                <a href="tel:+639123456789" class="contact-card">
                    <div class="contact-icon phone">
                         <i class="fa-solid fa-phone"></i>
                    </div>
                     <div class="contact-info">
                        <span class="platform">Phone / SMS</span>
                        <span class="handle">+63 912 345 6789</span>
                     </div>
                </a>

                <a href="mailto:leeprint.service@gmail.com" class="contact-card">
                    <div class="contact-icon email">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="contact-info">
                        <span class="platform">Email</span>
                        <span class="handle">leeprint.service@gmail.com</span>
                    </div>
                </a>

                <a href="viber://chat?number=+639123456789" class="contact-card">
                    <div class="contact-icon viber">
                        <i class="fa-brands fa-viber"></i>
                    </div>
                    <div class="contact-info">
                        <span class="platform">Viber</span>
                        <span class="handle">+63 912 345 6789</span>
                    </div>
                </a>
              </div>
        </section>
    </main>
</body>
</html>
