<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - LeePrint Printing Service</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="nav-logo">
        <img src="images/logo.png" alt="LeePrint Logo" class="logo">
      </a>
      <ul class="nav-menu">
        <button id="menu-close" class="close-btn">✖</button>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="booking.html">Booking</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button id="menu-open" class="menu-btn">☰</button>
    </nav>
  </header>

  <main>
    <section class="page-section">
      <h1>Booking</h1>
      <p>We offer:</p>
      <ul>
        <li>Printing • Layout • On-the-Spot Souvenir Booth</li>
        <li>Birthdays | Weddings | Corporate Events</li>
        <li>Custom giveaways & personalized souvenirs</li>
      </ul>

      <form class="booking-form">
        <label>Name:<br><input type="text" name="name" required></label><br>
        <label>Email:<br><input type="email" name="email" required></label><br>
        <label>Event Type:<br>
          <select name="event">
            <option>Birthday</option>
            <option>Wedding</option>
            <option>Corporate</option>
            <option>Other</option>
          </select>
        </label><br>
        <label>Date:<br><input type="date" name="date" required></label><br>
        <label>Quantity:<br><input type="number" name="quantity" min="1" required></label><br>
        <label>Special Requests:<br><textarea name="requests"></textarea></label><br>
        <button type="submit">Submit Booking</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 LeePrint Printing Service</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
